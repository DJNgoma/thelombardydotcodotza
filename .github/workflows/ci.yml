name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Use npm 11.12.1
        run: |
          corepack enable
          corepack prepare npm@11.12.1 --activate

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Verify static export output
        run: |
          test -f out/index.html
          test -f out/about/index.html
