name: Ensure www domain

# One-shot / ops workflow: ensures www.thelombardy.co.za DNS + Pages custom domain.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ensure-www:
    name: Ensure www.thelombardy.co.za
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Ensure www CNAME and Pages domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: thelombardy.co.za
          # Known zone id (zone list requires Zone.Zone:Read; DNS may still work with Zone.DNS)
          ZONE_ID: 19026fa9d42e43b7d7cc11b5e69c7a71
          WWW_HOST: www.thelombardy.co.za
          PAGES_PROJECT: thelombardy-co-za
          CNAME_TARGET: thelombardy-co-za.pages.dev
        run: |
          set -euo pipefail

          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }

          api() {
            local method="$1"
            local path="$2"
            shift 2
            curl -sS -X "$method" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4${path}" \
              "$@"
          }

          echo "Token verify..."
          api GET "/user/tokens/verify" | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>console.log(d));'

          zone_id="$ZONE_ID"
          echo "Using zone ${ZONE_NAME} id=${zone_id}"

          echo "Checking existing DNS for ${WWW_HOST}..."
          dns_json="$(api GET "/zones/${zone_id}/dns_records?type=CNAME&name=${WWW_HOST}")"
          echo "DNS list response (truncated): $(echo "$dns_json" | head -c 400)"
          record_id="$(node -e '
            const j = JSON.parse(process.argv[1]);
            if (!j.success) {
              console.error(JSON.stringify(j, null, 2));
              process.exit(1);
            }
            process.stdout.write(j.result[0]?.id || "");
          ' "$dns_json")"

          payload="$(node -e '
            process.stdout.write(JSON.stringify({
              type: "CNAME",
              name: "www",
              content: process.argv[1],
              proxied: true,
              ttl: 1,
            }));
          ' "$CNAME_TARGET")"

          if [ -n "$record_id" ]; then
            echo "Updating existing CNAME ${record_id}..."
            result="$(api PUT "/zones/${zone_id}/dns_records/${record_id}" --data "$payload")"
          else
            echo "Creating CNAME www -> ${CNAME_TARGET} (proxied)..."
            result="$(api POST "/zones/${zone_id}/dns_records" --data "$payload")"
          fi

          node -e '
            const j = JSON.parse(process.argv[1]);
            if (!j.success) {
              console.error(JSON.stringify(j, null, 2));
              console.error("HINT: CLOUDFLARE_API_TOKEN needs Zone.DNS Edit on thelombardy.co.za (and ideally Zone.Zone Read).");
              process.exit(1);
            }
            const r = j.result;
            console.log(`DNS OK: ${r.type} ${r.name} -> ${r.content} proxied=${r.proxied}`);
          ' "$result"

          echo "Ensuring Pages custom domain ${WWW_HOST}..."
          domains_json="$(api GET "/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}/domains")"
          has_www="$(node -e '
            const j = JSON.parse(process.argv[1]);
            if (!j.success) {
              console.error(JSON.stringify(j, null, 2));
              process.exit(1);
            }
            const found = (j.result || []).some((d) => d.name === process.argv[2]);
            process.stdout.write(found ? "yes" : "no");
          ' "$domains_json" "$WWW_HOST")"

          if [ "$has_www" = "yes" ]; then
            echo "Pages domain already present."
          else
            echo "Adding Pages custom domain..."
            add_json="$(api POST "/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}/domains" \
              --data "$(node -e 'process.stdout.write(JSON.stringify({ name: process.argv[1] }))' "$WWW_HOST")")"
            node -e '
              const j = JSON.parse(process.argv[1]);
              if (!j.success) {
                console.error(JSON.stringify(j, null, 2));
                process.exit(1);
              }
              console.log(`Pages domain added: ${j.result.name} status=${j.result.status}`);
            ' "$add_json"
          fi

          echo "Final Pages domain status:"
          final_json="$(api GET "/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}/domains")"
          node -e '
            const j = JSON.parse(process.argv[1]);
            for (const d of j.result || []) {
              console.log(`- ${d.name}: status=${d.status} verify=${d.verification_data?.status} valid=${d.validation_data?.status}`);
            }
          ' "$final_json"
